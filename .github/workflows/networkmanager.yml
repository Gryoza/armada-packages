name: networkmanager
on:
  push:
    branches: [main]
    paths: ['networkmanager/**', 'oci/**', '.github/workflows/networkmanager.yml', '.github/workflows/_package-image.yml', 'toolchain.env']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  build:
    uses: ./.github/workflows/_package-image.yml
    secrets: inherit
    with:
      package: networkmanager
